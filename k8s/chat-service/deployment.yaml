apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: nexuschat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: 416997488512.dkr.ecr.us-east-1.amazonaws.com/nexuschat-chat-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: nexuschat-config
            - secretRef:
                name: nexuschat-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5