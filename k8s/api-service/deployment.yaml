apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: nexuschat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: 416997488512.dkr.ecr.us-east-1.amazonaws.com/nexuschat-api-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: nexuschat-config
            - secretRef:
                name: nexuschat-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5