apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nexuschat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 416997488512.dkr.ecr.us-east-1.amazonaws.com/nexuschat-frontend:latest
          ports:
            - containerPort: 80